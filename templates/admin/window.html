{% extends 'base.html' %}
{% block title %}Manage Registration Window - DAUST Registration{% endblock %}
{% block content %}
<div class="content-box" style="max-width: 600px; margin: 0 auto;">
    <h2>Registration Window Management</h2>
    <p style="margin-bottom: 2rem;">Current Term: <strong>{{ window.termName }}</strong></p>

    <form method="POST" action="{{ url_for('admin_window') }}">
        <input type="hidden" name="window_id" value="{{ window.windowID }}">
        
        <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" name="startDate" value="{{ window.startDate }}" required>
        </div>
        
        <div class="form-group">
            <label for="endDate">End Date (Registration Closes on this day)</label>
            <input type="date" id="endDate" name="endDate" value="{{ window.endDate }}" required>
        </div>

        <div class="form-group">
            <label for="dropDeadline">Drop Deadline</label>
            <input type="date" id="dropDeadline" name="dropDeadline" value="{{ window.dropDeadline }}" required>
        </div>

        <div class="form-group">
            <label for="withdrawDeadline">Withdraw Deadline</label>
            <input type="date" id="withdrawDeadline" name="withdrawDeadline" value="{{ window.withdrawDeadline }}" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Update Window Dates</button>
    </form>
</div>
{% endblock %}
